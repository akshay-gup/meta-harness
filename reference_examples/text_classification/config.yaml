# Dataset split sizes — full datasets
dataset:
  num_train: 2
  num_val: 2
  num_test: 1
  overrides:
    # Replace data/form_filling.jsonl with your own examples, then set these
    # counts to match your desired train/validation/test split.
    FormFilling:               {num_train: 2, num_val: 2, num_test: 1}

# Inner loop settings
inner_loop:
  mode: online       # "online" or "offline"
  num_epochs: 1      # For offline mode: 1 epoch for local server speed (was 5)
  temperature: 0.0   # LLM temperature (null = model default)
  eval_interval: 0   # 0 = no intermediate evals
  batch_size: 1
  seed: 42

# Models to test
models:
  - model: together_ai/deepseek-ai/DeepSeek-V4-Pro
  # Requires TOGETHER_API_KEY in the environment.
  # To use a custom OpenAI-compatible endpoint instead, switch to e.g.:
  # - model: deepseek-ai/DeepSeek-V4-Pro
  #   api_base: https://api.together.xyz/v1

# Benchmark sweep settings
benchmark:
  seeds: [42]              # multi-seed: [42, 123, 456]
  concurrency: 3

# Datasets to test
datasets:
  - FormFilling

# Memory systems to test
memory_systems:
  baselines:
    - no_memory
    - fewshot_all
  proposed: []  # meta_harness.py writes candidate files into agents/ at runtime
